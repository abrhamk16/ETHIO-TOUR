<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIO TOUR | Professional Tourism Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #2ba11b; 
            --gold: #ebb22e;    
            --red: #b40505;
            --dark: #121212;
            --gray: #f8f9fa;
            --white: #ffffff;
            --text: #333333;
            --nav-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 5px 15px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --white: #1e1e1e;
            --gray: #121212;
            --text: #f8f9fa;
            --nav-bg: rgba(18, 18, 18, 0.95);
            --shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--gray); color: var(--text); scroll-behavior: smooth; line-height: 1.6; transition: var(--transition); }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.8rem 5%; background: var(--nav-bg); position: fixed; width: 100%; top: 0; z-index: 1000;
            box-shadow: var(--shadow); backdrop-filter: blur(10px);
        }
        .logo { font-size: 1.4rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        .nav-links { list-style: none; display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text); font-size: 0.8rem; font-weight: 600; }
        
        .nav-actions { display: flex; gap: 15px; align-items: center; }
        .login-btn { background: var(--primary); color: white !important; padding: 10px 22px; border-radius: 4px; cursor: pointer; border: none; font-size: 0.8rem; font-weight: 700; }
        .reg-link { font-size: 0.75rem; font-weight: 700; color: var(--primary); text-decoration: none; text-transform: uppercase; cursor: pointer; border-bottom: 2px solid transparent; }

        .icon-btn { background: none; border: none; color: var(--text); cursor: pointer; font-size: 1.2rem; }

        /* Hero */
        .hero {
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.pexels.com/photos/2539394/pexels-photo-2539394.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center;
        }
        .hero h1 { font-size: 3.5rem; font-weight: 800; }

        section { padding: 60px 8%; }
        .section-title { text-align: center; margin-bottom: 40px; }
        .section-title h2 { font-size: 2rem; color: var(--primary); }
        .underline { width: 60px; height: 4px; background: var(--gold); margin: 10px auto; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
        .card { background: var(--white); border-radius: 4px; overflow: hidden; box-shadow: var(--shadow); transition: var(--transition); border: 1px solid #eee; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; text-align: center; }
        
        .btn { padding: 12px; border: none; font-weight: 700; cursor: pointer; transition: var(--transition); text-transform: uppercase; text-decoration: none; display: inline-block; font-size: 0.8rem; }
        .btn-visit { background: var(--gold); color: white; width: 100%; }
        
        .btn-invest { background: var(--primary); color: white; display: block; max-width: 280px; margin: 40px auto 0; padding: 15px; text-align: center; border-radius: 4px; }
        .btn-invest:hover { background: var(--gold); }

        /* Contact Section */
        .contact-container { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 40px; 
            background: var(--white); padding: 40px; border: 1px solid #ddd; 
        }
        .form-group { margin-bottom: 15px; }
        .form-group input, .form-group textarea { 
            width: 100%; padding: 12px; border: 1px solid #ccc; outline: none; background: var(--gray); color: var(--text);
        }

        footer { background: var(--dark); color: white; padding: 30px; text-align: center; font-size: 0.8rem; }

        @media (max-width: 900px) { .grid, .contact-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ETHIO TOUR</div>
        <ul class="nav-links">
            <li><a href="#home">HOME</a></li>
            <li><a href="#destination">DESTINATIONS</a></li>
            <li><a href="#contact">CONTACT</a></li>
        </ul>
        <div class="nav-actions">
            <button class="icon-btn" onclick="toggleTheme()"><i class="fas fa-adjust"></i></button>
            <a onclick="openRegister()" class="reg-link">Register</a>
            <button class="login-btn">LOGIN</button>
        </div>
    </nav>

    <header class="hero" id="home">
        <h1>ETHIOPIA</h1>
        <p>LAND OF ORIGINS</p>
    </header>

    <section id="destination">
        <div class="section-title"><h2>Top Destinations</h2><div class="underline"></div></div>
        <div class="grid">
            <div class="card"><img src="https://images.pexels.com/photos/15857467/pexels-photo-15857467.jpeg?auto=compress&cs=tinysrgb&w=400"><div class="card-body"><h3>Lalibela</h3><a href="#" class="btn btn-visit">EXPLORE</a></div></div>
            <div class="card"><img src="https://images.pexels.com/photos/2539394/pexels-photo-2539394.jpeg?auto=compress&cs=tinysrgb&w=400"><div class="card-body"><h3>Simien Mountains</h3><a href="#" class="btn btn-visit">EXPLORE</a></div></div>
            <div class="card"><img src="https://images.pexels.com/photos/15101034/pexels-photo-15101034.jpeg?auto=compress&cs=tinysrgb&w=400"><div class="card-body"><h3>Aksum</h3><a href="#" class="btn btn-visit">EXPLORE</a></div></div>
        </div>

        <button onclick="openInvestorForm()" class="btn btn-invest">INVEST IN TOURISM</button>
    </section>

    <section id="contact">
        <div class="section-title"><h2>Contact Us</h2><div class="underline"></div></div>
        <div class="contact-container">
            <div>
                <h3>Official Office</h3>
                <p>Addis Ababa, Ethiopia</p>
                <p>contact@ethiotour.et</p>
            </div>
            <form id="mainContactForm">
                <div class="form-group"><input type="text" placeholder="Name" required></div>
                <div class="form-group"><input type="email" id="cEmail" placeholder="Email" required></div>
                <div class="form-group"><textarea rows="3" placeholder="Message" required></textarea></div>
                <button type="submit" class="btn btn-visit" id="cBtn">SEND MESSAGE</button>
            </form>
        </div>
    </section>

    <footer><p>&copy; 2026 ETHIO TOUR</p></footer>

    <script>
        function toggleTheme() {
            const b = document.documentElement;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        // Email Handling Logic
        document.getElementById('mainContactForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('cBtn');
            const email = document.getElementById('cEmail').value;
            btn.innerText = "SENDING...";
            setTimeout(() => {
                alert("Message sent successfully from: " + email);
                btn.innerText = "SEND MESSAGE";
                this.reset();
            }, 1000);
        };

        // REGISTRATION POPUP (Original Structure)
        function openRegister() {
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <title>REGISTER</title>
                    <style>
                        body { font-family: sans-serif; background: #f0f2f5; padding: 40px; }
                        .box { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 8px; border-top: 6px solid #2ba11b; }
                        h2 { color: #2ba11b; text-align: center; }
                        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; }
                        .btn { width: 100%; padding: 15px; background: #2ba11b; color: white; border: none; font-weight: bold; cursor: pointer; }
                    </style>
                </head>
                <body>
                    <div class="box">
                        <h2>Travel Registration</h2>
                        <form id="f">
                            <input type="text" placeholder="Full Name" required>
                            <input type="email" id="re" placeholder="Email" required>
                            <input type="text" placeholder="Nationality" required>
                            <button type="submit" class="btn">REGISTER NOW</button>
                        </form>
                    </div>
                    <script>
                        document.getElementById('f').onsubmit = (e) => {
                            e.preventDefault();
                            alert("Registered: " + document.getElementById('re').value);
                            window.close();
                        }
                    <\/script>
                </body>
                </html>
            `);
            win.document.close();
        }

        // INVESTOR FORM (Matching the Registration structure exactly)
        function openInvestorForm() {
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <title>INVESTOR FORM</title>
                    <style>
                        body { font-family: sans-serif; background: #f0f2f5; padding: 40px; }
                        .box { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 8px; border-top: 6px solid #ebb22e; }
                        h2 { color: #2ba11b; text-align: center; margin-bottom: 20px; }
                        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #666; }
                        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; box-sizing: border-box; }
                        .btn { width: 100%; padding: 15px; background: #ebb22e; color: white; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
                        .btn:hover { background: #2ba11b; }
                    </style>
                </head>
                <body>
                    <div class="box">
                        <h2>Investor Application</h2>
                        <form id="invF">
                            <label>FULL NAME / COMPANY</label>
                            <input type="text" placeholder="Enter Name" required>
                            
                            <label>CONTACT EMAIL</label>
                            <input type="email" id="ie" placeholder="Email Address" required>
                            
                            <label>INVESTMENT SECTOR</label>
                            <select>
                                <option>Hospitality & Hotels</option>
                                <option>Eco-Tourism Infrastructure</option>
                                <option>Transportation Services</option>
                            </select>

                            <label>ESTIMATED CAPITAL (USD)</label>
                            <input type="text" placeholder="$50,000+" required>
                            
                            <label>BRIEF PROPOSAL</label>
                            <textarea rows="3" placeholder="Tell us about your project"></textarea>
                            
                            <button type="submit" class="btn" id="sB">Submit Proposal</button>
                        </form>
                    </div>
                    <script>
                        document.getElementById('invF').onsubmit = (e) => {
                            e.preventDefault();
                            const btn = document.getElementById('sB');
                            const email = document.getElementById('ie').value;
                            btn.innerText = "SAVING...";
                            setTimeout(() => {
                                alert("Thank you! Investor data for " + email + " has been recorded.");
                                window.close();
                            }, 1200);
                        }
                    <\/script>
                </body>
                </html>
            `);
            win.document.close();
        }
    </script>
</body>
</html>
